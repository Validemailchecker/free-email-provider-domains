name: Update free-email-provider list

# Re-aggregates the upstream community lists weekly and commits if changed.

on:
  schedule:
    - cron: '0 4 * * 1' # Mondays, 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild list from sources
        run: node scripts/aggregate.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/domains.txt; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/domains.txt
          git commit -m "chore: weekly free-email-provider list update ($(wc -l < data/domains.txt) domains)"
          git push
